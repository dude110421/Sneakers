<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoleVision - Personal Sneaker Stylist</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SoleVision">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Personal Sneaker Stylist</h1>
            <p class="text-gray-500 mt-2">Your AI-powered style assistant.</p>
        </header>
        <div class="mb-6 border-b border-gray-200">
            <nav class="flex -mb-px" aria-label="Tabs">
                <button class="tab-btn active w-1/4 py-4 px-1 text-center border-b-2 font-medium text-sm" data-tab="stylist">Stylist</button>
                <button class="tab-btn inactive w-1/4 py-4 px-1 text-center border-b-2 font-medium text-sm" data-tab="browse">Browse</button>
                <button class="tab-btn inactive w-1/4 py-4 px-1 text-center border-b-2 font-medium text-sm" data-tab="outfitBuilder">Outfits</button>
                <button class="tab-btn inactive w-1/4 py-4 px-1 text-center border-b-2 font-medium text-sm" data-tab="closet">Closet</button>
            </nav>
        </div>
        <main id="stylist-view">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">1. Upload Your Outfit</label>
                <input type="file" id="image-upload" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
            </div>
            <div id="image-preview-container" class="mb-6 hidden w-full aspect-square bg-gray-100 rounded-xl flex items-center justify-center overflow-hidden">
                <img id="image-preview" src="#" alt="Your Outfit" class="w-full h-full object-cover" />
            </div>
            <div id="image-placeholder" class="mb-6 w-full aspect-square bg-gray-100 rounded-xl flex items-center justify-center border-2 border-dashed">
                <p class="text-gray-400">Image preview</p>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">2. Select an Occasion</label>
                <div id="occasion-filters" class="grid grid-cols-3 gap-2">
                    <button class="filter-btn py-2 px-4 rounded-lg active" data-occasion="casual">Casual</button>
                    <button class="filter-btn py-2 px-4 rounded-lg inactive" data-occasion="athleisure">Athleisure</button>
                    <button class="filter-btn py-2 px-4 rounded-lg inactive" data-occasion="work">Work</button>
                </div>
            </div>
            <button id="analyze-button" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 disabled:bg-gray-400 disabled:cursor-not-allowed">
                3. Analyze Outfit
            </button>
            <div id="results-container" class="mt-8"></div>
        </main>
        <div id="browse-view" class="hidden">
            <h2 class="text-xl font-bold text-center mb-4">Browse Collection</h2>
            <input type="text" id="browse-search" placeholder="Search for a sneaker..." class="w-full rounded-md border-gray-200 shadow-sm sm:text-sm p-2 border mb-4">
            <div id="browse-items-container" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
        <div id="outfit-builder-view" class="hidden">
            <div id="outfit-builder-selection">
                <h2 class="text-xl font-bold text-center mb-4">Select a Sneaker to Style</h2>
                <div id="outfit-builder-closet-items" class="grid grid-cols-3 gap-4"></div>
            </div>
            <div id="outfit-builder-results" class="hidden"></div>
        </div>
        <div id="closet-view" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">My Sneaker Closet</h2>
                <button id="add-sneaker-btn" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 text-sm">+ Add New</button>
            </div>
            <div id="closet-items-container" class="space-y-3"></div>
        </div>
    </div>
    <div id="add-sneaker-modal" class="modal fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <h3 id="modal-title" class="text-lg leading-6 font-medium text-gray-900">Add a Custom Sneaker</h3>
                <form id="add-sneaker-form" class="mt-2 px-7 py-3 space-y-4 text-left">
                    <input type="hidden" id="sneaker-id">
                    <div>
                        <label for="sneaker-name" class="text-sm font-medium">Sneaker Name</label>
                        <input type="text" id="sneaker-name" required class="mt-1 w-full rounded-md border-gray-200 shadow-sm sm:text-sm p-2 border">
                    </div>
                    <div>
                        <label for="sneaker-image-upload" class="text-sm font-medium">Thumbnail</label>
                        <input type="file" id="sneaker-image-upload" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-50 file:text-gray-700 hover:file:bg-gray-100">
                        <img id="modal-image-preview" src="#" alt="Sneaker preview" class="hidden mt-2 w-24 h-24 rounded-md object-cover mx-auto" />
                    </div>
                    <div>
                        <label class="text-sm font-medium">Colors (AI Suggested)</label>
                        <div id="color-checkboxes" class="grid grid-cols-3 gap-2 mt-1"></div>
                    </div>
                    <div>
                        <label class="text-sm font-medium">Occasions</label>
                        <div id="occasion-checkboxes" class="grid grid-cols-3 gap-2 mt-1"></div>
                    </div>
                </form>
                <div class="items-center px-4 py-3">
                    <button id="save-sneaker-btn" class="px-4 py-2 bg-blue-600 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Save Sneaker</button>
                    <button id="cancel-sneaker-btn" class="mt-2 px-4 py-2 bg-gray-200 text-gray-800 text-base font-medium rounded-md w-full shadow-sm hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-300">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.error('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
